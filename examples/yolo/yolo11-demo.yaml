name: yolo11-demo
repo: https://github.com/ultralytics/ultralytics.git
branch: main
shallow: true
workspace: /workspace/yolo11-demo

pod:
  gpu_type: "NVIDIA GeForce RTX 4090"
  container_disk: 20
  volume_disk: 50

python: "3.11"

install_torch: "torch==2.6.0 torchvision==0.21.0"
install_flags: "--index-url https://download.pytorch.org/whl/cu124"

install:
  - "."
  - "wandb"

setup:
  - |
    cat > parse_metrics.py << 'PYEOF'
    import csv, os, glob

    run_name = os.environ.get("RUN_NAME", "yolo11-run")
    patterns = [
        f"runs/detect/{run_name}/results.csv",
        f"runs/{run_name}/results.csv",
        f"**/{run_name}/results.csv",
    ]
    results_file = None
    for pattern in patterns:
        matches = glob.glob(pattern, recursive=True)
        if matches:
            results_file = sorted(matches)[0]
            break
    if not results_file:
        matches = glob.glob("runs/**/results.csv", recursive=True)
        if matches:
            results_file = sorted(matches)[-1]
    if results_file:
        rows = list(csv.DictReader(open(results_file)))
        if rows:
            last = rows[-1]
            for key, name in [
                ("metrics/precision(B)", "precision_b"),
                ("metrics/recall(B)", "recall_b"),
                ("metrics/mAP50(B)", "map50_b"),
                ("metrics/mAP50-95(B)", "map50_95_b"),
            ]:
                if key in last:
                    print(f"metric:{name}={last[key].strip()}")
        else:
            print("WARNING: results.csv is empty")
    else:
        print("WARNING: No results.csv found")
    PYEOF
  - yolo settings wandb=true

train: >-
  yolo settings wandb=true &&
  yolo detect train
  model=${MODEL:-yolo11n.pt}
  data=${DATA:-coco128.yaml}
  epochs=${EPOCHS:-100}
  imgsz=${IMGSZ:-640}
  batch=${BATCH:-16}
  project=yolo11_runs
  name=${RUN_NAME:-yolo11-run}
  && python parse_metrics.py

timeout: 14400

env_forward:
  - WANDB_API_KEY
  - WANDB_ENTITY

env_set:
  WANDB_PROJECT: crucible-yolo11
  WANDB_MODE: online

metrics:
  source: stdout
  primary: map50_95_b
  direction: maximize
