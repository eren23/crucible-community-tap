name: jepa_lm
type: architectures
version: 0.1.0
description: >
  JEPA-on-LM hybrid for parameter-golf non-record / unlimited-compute track.
  Standard CE LM head drives val_bpb. Two auxiliary JEPA paths share a small
  predictor MLP: (A) hidden-state aux JEPA — predict same-layer hidden state
  k positions ahead, MSE + VICReg variance reg, stop-grad target (no extra
  encoder, fits 16MB budget); (B) token-decoder JEPA — project the predicted
  embedding through the tied LM head and apply CE against the actual token
  k positions ahead. Both paths toggleable via JEPA_ALPHA / JEPA_BETA env
  vars (set both to 0 for pure baseline behavior). Built on BaselineGPT so
  all standard parameter-golf augmentations (SmearGate, BigramHash,
  TrigramHash, U-Net skip, GQA, ortho init) remain available.
author: eren23
tags:
  - architecture
  - jepa
  - parameter-golf
  - non-record
  - lm-aux-loss
  - token-decoder-jepa
  - feature-prediction
config:
  MODEL_FAMILY: jepa_lm
  JEPA_ALPHA: 0.1
  JEPA_BETA: 0.05
  JEPA_VAR_WEIGHT: 0.1
  JEPA_CHUNK: 8
  JEPA_PREDICTOR_DIM: 64
