name: jepa_lm
type: architectures
version: 0.2.0
description: >
  JEPA-on-LM hybrid for parameter-golf non-record / unlimited-compute track.
  v0.2 informed by parameter-golf community PRs (#832, #896, #1330, #1556,
  #1581): defaults dropped 40x to lambda ~= 0.005, off-diagonal covariance
  penalty (V-JEPA) opt-in, predictor injection mode opt-in. Standard CE LM
  head still drives val_bpb. Path A = hidden-state aux MSE (+ VICReg variance
  + optional covariance). Path B = token-decoder CE through tied LM head.
  Injection mode = zero-init project predicted latent into hidden stream so
  JEPA contributes a feature, not just a side loss (PR #832 winner pattern).
  All JEPA components zero-initialized so JEPA_ALPHA=JEPA_BETA=0,
  JEPA_INJECTION=0 recovers BaselineGPT numerics exactly.
author: eren23
tags:
  - architecture
  - jepa
  - parameter-golf
  - non-record
  - lm-aux-loss
  - token-decoder-jepa
  - v-jepa-covariance
  - predictor-injection
  - feature-prediction
config:
  MODEL_FAMILY: jepa_lm
  JEPA_ALPHA: 0.005
  JEPA_BETA: 0.005
  JEPA_VAR_WEIGHT: 0.1
  JEPA_COVAR_WEIGHT: 0.0
  JEPA_CHUNK: 8
  JEPA_PREDICTOR_DIM: 64
  JEPA_INJECTION: 0
