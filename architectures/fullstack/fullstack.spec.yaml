name: sota_inspired_v1
version: 1
base: tied_embedding_lm
embedding:
  vocab_size: '{VOCAB_SIZE:50304}'
  model_dim: '{MODEL_DIM:512}'
  tie_embeddings: '{TIE_EMBEDDINGS:true}'
  tied_embed_init_std: '{TIED_EMBED_INIT_STD:0.02}'
  logit_softcap: '{LOGIT_SOFTCAP:30.0}'
  embed_bottleneck_dim: '{EMBED_BOTTLENECK_DIM:0}'
  spectral_embed_init: '{SPECTRAL_EMBED_INIT:false}'
block:
  type: attention_block
  dim: '{MODEL_DIM:512}'
  params:
    num_heads: '{NUM_HEADS:8}'
    num_kv_heads: '{NUM_KV_HEADS:4}'
    mlp_mult: '{MLP_MULT:3}'
    rope_base: '{ROPE_BASE:10000.0}'
    qk_gain_init: '{QK_GAIN_INIT:1.0}'
    attention_variant: standard
    residual_variant: gated
    multiscale_window: '{MULTISCALE_WINDOW:64}'
    block_pattern: '{BLOCK_PATTERN:}'
    activation: '{ACTIVATION:relu_sq}'
stack:
  pattern: encoder_decoder_skip
  num_layers: '{NUM_LAYERS:11}'
init:
  ortho: true
augmentations:
  smear_gate:
    enabled: true
    dim: '{MODEL_DIM:512}'
  bigram_hash:
    enabled: true
    vocab_size: '{VOCAB_SIZE:50304}'
    num_buckets: '{BIGRAM_HASH_BUCKETS:4096}'
    embed_dim: '{BIGRAM_HASH_EMBED_DIM:128}'
    model_dim: '{MODEL_DIM:512}'
  trigram_hash:
    enabled: true
    vocab_size: '{VOCAB_SIZE:50304}'
    num_buckets: '{TRIGRAM_HASH_BUCKETS:4096}'
    embed_dim: '{TRIGRAM_HASH_EMBED_DIM:128}'
    model_dim: '{MODEL_DIM:512}'
