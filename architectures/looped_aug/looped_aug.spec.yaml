# Looped Transformer + Augmentations — novel hybrid composed via lego-block system
# Combines looped stack pattern (weight sharing, parameter efficient) with
# BigramHash + SmearGate augmentations (borrowed from baseline)
name: looped_augmented
version: 1
base: tied_embedding_lm

embedding:
  vocab_size: "{VOCAB_SIZE:50304}"
  model_dim: "{MODEL_DIM:512}"
  tie_embeddings: "{TIE_EMBEDDINGS:true}"
  tied_embed_init_std: "{TIED_EMBED_INIT_STD:0.02}"
  logit_softcap: "{LOGIT_SOFTCAP:30.0}"
  embed_bottleneck_dim: "{EMBED_BOTTLENECK_DIM:0}"
  spectral_embed_init: "{SPECTRAL_EMBED_INIT:false}"

block:
  type: attention_block
  dim: "{MODEL_DIM:512}"
  params:
    num_heads: "{NUM_HEADS:8}"
    num_kv_heads: "{NUM_KV_HEADS:4}"
    mlp_mult: "{MLP_MULT:2}"
    rope_base: "{ROPE_BASE:10000.0}"
    qk_gain_init: "{QK_GAIN_INIT:1.0}"
    attention_variant: "{ATTENTION_VARIANT:standard}"
    residual_variant: "{RESIDUAL_VARIANT:standard}"
    activation: "{ACTIVATION:relu_sq}"

stack:
  pattern: looped
  logical_steps: "{RECURRENCE_STEPS:12}"
  unique_blocks: "{SHARE_BLOCKS:3}"

augmentations:
  smear_gate:
    enabled: "{SMEAR_GATE:true}"
    dim: "{MODEL_DIM:512}"
  bigram_hash:
    enabled: "{BIGRAM_HASH:true}"
    vocab_size: "{VOCAB_SIZE:50304}"
    num_buckets: "{BIGRAM_HASH_BUCKETS:4096}"
    embed_dim: "{BIGRAM_HASH_EMBED_DIM:128}"
    model_dim: "{MODEL_DIM:512}"

init:
  ortho: "{ORTHO_INIT:true}"
