name: sota_inspired_v1
type: architectures
version: "0.1.0"
description: >
  Declarative SOTA-inspired architecture composed from attention_block with
  encoder_decoder_skip pattern, gated residuals, multiscale windows, and the
  full SmearGate + BigramHash + TrigramHash augmentation stack. Mid-point
