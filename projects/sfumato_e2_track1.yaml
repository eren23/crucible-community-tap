name: sfumato_e2_track1
description: |
  Track 1 — Interface-robustness LoRA on LLaDA-8B-Instruct.
  Trained on prefix-randomized GSM8K (eren23/sfumato-prefix-robust-gsm8k).
  Goal: collapse the prefix-damage hierarchy observed in E4.

repo: "https://github.com/eren23/sfumato"
branch: main
shallow: true
workspace: /workspace/sfumato

pod:
  gpu_type: "NVIDIA GeForce RTX 4090"
  gpu_count: 1
  container_disk: 100
  volume_disk: 100
  interruptible: true

python: "3.11"

install_torch: "torch==2.4.0"
install_flags: "--index-url https://download.pytorch.org/whl/cu121"
install:
  - "transformers==4.46.3"
  - "peft>=0.13"
  - "accelerate>=0.34"
  - "datasets>=2.20"
  - "huggingface_hub"
  - "wandb"
  - "bitsandbytes"
  - "numpy"

setup:
  - "python scripts/freeze_gsm8k.py"

train: >-
  LORA_R=${LORA_R:-16}
  LORA_ALPHA=${LORA_ALPHA:-32}
  LR=${LR:-1e-4}
  EPOCHS=${EPOCHS:-3}
  BATCH_SIZE=${BATCH_SIZE:-1}
  GRAD_ACCUM=${GRAD_ACCUM:-4}
  WARMUP_STEPS=${WARMUP_STEPS:-500}
  SEED=${SEED:-42}
  HF_DATASET_ID=${HF_DATASET_ID:-eren23/sfumato-prefix-robust-gsm8k}
  HF_OUTPUT_REPO=${HF_OUTPUT_REPO:-eren23/sfumato-llada-prefix-robust}
  WANDB_RUN_NAME=${WANDB_RUN_NAME:-track1-prefix-robust}
  SAVE_DIR=/workspace/track1_lora
  python scripts/train_track1_lora.py

timeout: 21600  # 6 hours; spot-friendly

env_forward:
  - WANDB_API_KEY
  - WANDB_ENTITY
  - HUGGINGFACE_HUB_TOKEN

env_set:
  WANDB_PROJECT: sfumato-e2
  WANDB_MODE: online
  HF_HOME: /workspace/.hf_cache
  TRANSFORMERS_CACHE: /workspace/.hf_cache
  PYTHONUNBUFFERED: "1"

env_defaults:
  LORA_R: "16"
  LORA_ALPHA: "32"
  LR: "1e-4"
  EPOCHS: "3"
  BATCH_SIZE: "1"
  GRAD_ACCUM: "4"
  WARMUP_STEPS: "500"
  SEED: "42"
  HF_DATASET_ID: "eren23/sfumato-prefix-robust-gsm8k"
  HF_OUTPUT_REPO: "eren23/sfumato-llada-prefix-robust"
  WANDB_RUN_NAME: "track1-prefix-robust"

metrics:
  source: stdout
  primary: val_loss
  direction: minimize
