    WM_WINDOW_LEN: "3"
    WM_EMA_DECAY: "0.99999"
    WM_PREDICTOR_DEPTH: "2"
    WM_PRED_REG_MODE: "vicreg"
    WM_LAMBDA_PRED_REG: "0.1"
