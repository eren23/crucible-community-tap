    WM_MODEL_DIM: "128"
    WM_NUM_LOOPS: "6"
    WM_NUM_HEADS: "4"
    WM_ENCODER_LOOPS: "6"
    ACTION_DIM: "7"
    WM_LR: "1e-4"
    WM_BATCH_SIZE: "128"
    WM_STEPS: "15000"
    WM_WINDOW_LEN: "3"
    WM_EMA_DECAY: "0.99999"
    WM_PREDICTOR_DEPTH: "2"
    WM_PRED_REG_MODE: "none"
    WM_LAMBDA_PRED_REG: "0"
    WM_SEED: "42"
    WANDB_RUN_NAME: "phase10-pred-reg-baseline"

  phase10_pred_vicreg_01:
