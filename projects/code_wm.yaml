    WM_NUM_LOOPS: "6"
    WM_NUM_HEADS: "4"
    WM_ENCODER_LOOPS: "6"
    ACTION_DIM: "7"
    WM_LR: "1e-4"
    WM_BATCH_SIZE: "128"
